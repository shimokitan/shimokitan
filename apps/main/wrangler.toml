name = "shimokitan-main"
main = ".open-next/worker.js"

compatibility_date = "2025-04-01"
compatibility_flags = [
  "nodejs_compat",
  "global_fetch_strictly_public"
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "shimokitan-main"

[[r2_buckets]]
binding = "MY_BUCKET"
bucket_name = "shimokitan-assets"
